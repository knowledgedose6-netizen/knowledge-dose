{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<h3 class="text-center" style="text-align: center;">Login</h3>

<form action="{% url 'login' %}" method="POST" style="width:500px; margin:auto;" class="login-form">
    {% csrf_token %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-warning">Login</button>
</form>

<!-- 🔥 NEW CODE START: Register suggestion for users -->
<p style="text-align:center; margin-top:15px;">
    If you don't have an account?
    <a href="{% url 'register' %}" class="btn btn-sm btn-outline-warning">Register</a>
</p>
<!-- 🔥 NEW CODE END -->

{% endblock %}
