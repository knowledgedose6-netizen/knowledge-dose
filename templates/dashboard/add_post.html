{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<div class="addpost-main-container">
    <!-- Left sidebar -->
    <div class="addpost-sidebar-wrapper">
        {% include 'dashboard/sidebar.html' %}
    </div>

    <!-- Right side content -->
    <div class="addpost-form-container">
        <div class="addpost-card">
            <div class="addpost-card-header">
                <h2 class="addpost-card-title">Add New Post</h2>
                <p class="addpost-card-subtitle">Create a new blog post with content and settings</p>
            </div>
            
            <form action="{% url 'add_post' %}" method="POST" enctype="multipart/form-data" class="addpost-custom-form">
                {% csrf_token %}
                {{ form | crispy }}
                <div class="addpost-button-group">
                    <button type="submit" class="addpost-btn-submit">
                        <i class="fa fa-save"></i> Publish Post
                    </button>
                    <a href="{% url 'posts' %}" class="addpost-btn-cancel">
                        <i class="fa fa-arrow-left"></i> Back to Posts
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
