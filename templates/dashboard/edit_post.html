
{% extends 'dashboard/admin_base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="kdose-page-header">

    <div>

        <h1>Edit Blog Post</h1>

        <p>
            Update your blog content and settings
        </p>

    </div>

</div>

<div class="kdose-form-card">

    <form action="{% url 'edit_post' post.id %}"
          method="POST"
          enctype="multipart/form-data"
          class="kdose-form">

        {% csrf_token %}

        {{ form|crispy }}

        <div class="kdose-form-actions">

            <button type="submit"
                    class="kdose-btn">

                <i class="fa fa-save"></i>
                Update Post

            </button>

            <a href="{% url 'posts' %}"
               class="kdose-btn-secondary">

                <i class="fa fa-arrow-left"></i>
                Back to Posts

            </a>

        </div>

    </form>

</div>

{% endblock %}
