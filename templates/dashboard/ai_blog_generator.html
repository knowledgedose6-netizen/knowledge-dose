{% extends 'dashboard/admin_base.html' %}

{% block content %}

<div class="kdose-page-header">

    <h1>AI Blog Generator</h1>

    <p>Generate complete blog content using AI</p>

</div>

<div class="kdose-form-card">

    <form method="POST">

        {% csrf_token %}

        <div class="kdose-form-group">

            <label>Blog Topic</label>

            <input
                type="text"
                name="topic"
                class="kdose-input"
                placeholder="Enter blog topic"
            >

        </div>

        <button
            type="submit"
            class="kdose-btn">

            Generate Blog

        </button>

    </form>

</div>

{% if generated_blog %}

<div class="kdose-form-card">

    <h3>Generated Content</h3>

    <textarea
        class="kdose-textarea"
        rows="15">{{ generated_blog }}</textarea>

</div>

{% endif %}

{% endblock %}
