{% extends 'dashboard/admin_base.html' %}

{% block content %}

<div class="kdose-page-header">

    <div>

        <h1>Add New Category</h1>

        <p>Create a new category for your blog posts</p>

    </div>

</div>

<form method="POST"
      class="kdose-form">

    {% csrf_token %}

    <div class="kdose-form-group">

        <label>
            Category Name
        </label>

        {{ form.category_name }}

    </div>

    <div class="kdose-form-actions">

        <button type="submit"
                class="kdose-btn">

            <i class="fa fa-save"></i>
            Create Category

        </button>

        <a href="{% url 'categories' %}"
           class="kdose-btn">

            <i class="fa fa-arrow-left"></i>
            Back

        </a>

    </div>

</form>

{% endblock %}
