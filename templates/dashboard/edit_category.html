{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<div class="editcategory-main-container">
    <!-- Left sidebar -->
    <div class="editcategory-sidebar-wrapper">
        {% include 'dashboard/sidebar.html' %}
    </div>

    <!-- Right side content -->
    <div class="editcategory-form-container">
        <div class="editcategory-card">
            <div class="editcategory-card-header">
                <h2 class="editcategory-card-title">Edit Category</h2>
                <p class="editcategory-card-subtitle">Update category information</p>
            </div>
            
            <form action="{% url 'edit_category' category.id %}" method="POST" class="editcategory-custom-form">
                {% csrf_token %}
                {{ form | crispy }}
                <div class="editcategory-button-group">
                    <button type="submit" class="editcategory-btn-submit">
                        <i class="fa fa-save"></i> Update Category
                    </button>
                    <a href="{% url 'categories' %}" class="editcategory-btn-cancel">
                        <i class="fa fa-arrow-left"></i> Back to Categories
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
