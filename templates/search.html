{% extends 'base.html' %}

{% block content %}

<h3 class="text-warning search-heading" style="letter-spacing: 2px;">Search Term - {{ keyword }}</h3>
  <div class="row mb-2 search-posts-row">
    {% if blogs %}
    {% for i in blogs %}
    <div class="col-md-6 search-post-column">
      <div class="card border-0 search-post-card" >
        <div class="card-body search-post-card-body" style="background-image:url({{ i.featured_image.url}});background-position: center; background-repeat: no-repeat;background-blend-mode: overlay;background-size:cover">
          <h3 class="search-post-title"><a href="{% url 'blogs' i.slug %}" class="text-white">{{i.title }}</a></h3>
          <small class="mb-1 text-muted search-post-meta"> {{i.created_at | timesince }} ago | {{ i.author}} </small>
          <p class="card-text search-post-excerpt">{{ i.short_description | truncatewords:25}}</p>
        </div>
      </div>
    </div>
    {% endfor %}
    {% else %} 
    <p class="search-no-posts"> No posts found </p>
    {% endif %}
  </div>
  
{% endblock %}
