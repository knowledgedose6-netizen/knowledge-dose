{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<h3 class="text-center"><p style="text-align: center;">Register</p></h3>
<form action="{% url 'register' %}" method="POST" style="width:500px; margin:auto;" class="register-form">
    {% csrf_token %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-warning">Submit</button>
</form>

<!-- 🔥 NEW CODE START: Login suggestion for existing users -->
<p style="text-align:center; margin-top:15px;">
    Already have an account?
    <a href="{% url 'login' %}" class="btn btn-sm btn-outline-secondary">Login</a>
</p>
<!-- 🔥 NEW CODE END -->

{% endblock %}
